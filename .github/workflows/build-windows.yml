name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Install Tesseract
      run: |
        choco install tesseract -y

    - name: Build EXE
      run: |
        pyinstaller --onefile --console main.py --name SAC --icon SAC.ico --collect-all cv2 --noconfirm --clean

    - name: Prepare release
      run: |
        mkdir release
        copy dist\SAC.exe release\SAC.exe

        xcopy Workspace release\Workspace /E /I
        xcopy Converter release\Converter /E /I

        mkdir release\Tesseract
        copy "C:\Program Files\Tesseract-OCR\tesseract.exe" release\Tesseract\tesseract.exe
        xcopy "C:\Program Files\Tesseract-OCR\tessdata" release\Tesseract\tessdata /E /I

        copy Instruction_UA.txt release\Instruction_UA.txt

        powershell Compress-Archive -Path release\* -DestinationPath SAC-release.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: SAC-release
        path: SAC-release.zip
